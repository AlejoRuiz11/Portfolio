     BASE & TOKENS
  ================================================================ */
  :root {
    --bg:        #07070f;
    --bg-alt:    #0c0c1b;
    --card:      rgba(255,255,255,.032);
    --border:    rgba(255,255,255,.07);
    --accent:    #6366f1;
    --accent2:   #06b6d4;

    --muted:     #94a3b8;
    --subtle:    #475569;
    --r:         14px;

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

     ANIMATIONS
  ================================================================ */

  @keyframes float     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }
  @keyframes pulse-dot { 0%,100%{box-shadow:0 0 6px #4ade80} 50%{box-shadow:0 0 14px #4ade80,0 0 28px #4ade80} }
  @keyframes fadeIn    { from{opacity:0} to{opacity:1} }

     TYPOGRAPHY
  ================================================================ */

function ytId(url) {
  if(!url) return null;
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return m?m[1]:null;

const { useState, useEffect, useRef, useContext, createContext, useCallback } = React;

/* ================================================================
   HOOK — Scroll Reveal
================================================================ */
function useReveal(ref) {
  useEffect(() => {
    if(!ref.current) return;
    const els = ref.current.querySelectorAll('.sr');
    const io = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
    },{ threshold:.1 });
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);
}

function AdminToggle() {
  const { adminMode, setAdminMode } = useContext(Ctx);
  function handle() {
    if(adminMode){ setAdminMode(false); return; }
    const pw = window.prompt("Admin password:");
    if(pw===null) return;
    if(pw===CONFIG.adminPass) setAdminMode(true);
    else alert("Incorrect password.");
  }
  return (
    <button className="admin-toggle" onClick={handle}
      title={adminMode?"Exit admin mode":"Admin login"}>
      {adminMode ? "🔓" : "🔧"}
    </button>
  );
}

================================================================ */
function ProjectModal() {
  const { modal, setModal, adminMode, store, updateStore } = useContext(Ctx);
  const [tab, setTab] = useState('overview');
  const [form, setForm] = useState({github:'',demo:'',videoUrl:'',imageUrls:[''],notes:''});
  const [saved, setSaved] = useState(false);

  useEffect(()=>{
    if(!modal) return;
    setTab('overview'); setSaved(false);
    const ex=store.projects[modal.id]||{};
    setForm({ github:ex.github||'', demo:ex.demo||'', videoUrl:ex.videoUrl||'', imageUrls:ex.imageUrls?.length?ex.imageUrls:[''], notes:ex.notes||'' });
  },[modal]);

  useEffect(()=>{ const fn=e=>{ if(e.key==='Escape') setModal(null); }; window.addEventListener('keydown',fn); return()=>window.removeEventListener('keydown',fn); },[]);

  const catClass={prob:'badge-prob',ml:'badge-ml',unity:'badge-unity',web:'badge-web'};
  const catLabel={prob:'🔵 Probabilistic',ml:'🤖 ML / AI',unity:'🎮 Simulation',web:'🌐 Web'};

  if(!modal) return null;
  const ex   = store.projects[modal.id]||{};
  const vid  = ytId(ex.videoUrl||'');
  const imgs = (ex.imageUrls||[]).filter(Boolean);
  const hasMedia = vid||imgs.length>0;

  // Build tabs
  const tabs=[{id:'overview',label:'Overview'}];
  if(hasMedia) tabs.push({id:'media',label:'Media'});
  if(adminMode) tabs.push({id:'edit',label:'✏️ Edit'});

  function saveForm() {
    updateStore(prev=>({
      ...prev,
      projects:{ ...prev.projects, [modal.id]:{ ...form, imageUrls:form.imageUrls.filter(Boolean) } }
    }));
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  function uploadFiles(e) {
    Array.from(e.target.files).forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>setForm(prev=>({...prev,imageUrls:[...prev.imageUrls.filter(Boolean),ev.target.result]}));
      r.readAsDataURL(f);
    });
  }

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) setModal(null); }}>
      <div className="modal-box">
        <button className="modal-close" onClick={()=>setModal(null)}>✕</button>

        {/* Header */}
        <div style={{padding:'26px 26px 0',clear:'both'}}>
          <div style={{display:'flex',gap:'9px',alignItems:'center',marginBottom:'11px',flexWrap:'wrap'}}>
            <span className={`badge ${catClass[modal.cat]}`}>{catLabel[modal.cat]}</span>
            {modal.star&&<span style={{fontSize:'.7rem',fontWeight:700,color:'#c084fc',background:'rgba(192,132,252,.09)',border:'1px solid rgba(192,132,252,.2)',padding:'2px 10px',borderRadius:'12px'}}>⭐ {modal.star}</span>}
          </div>
          <h2 style={{fontSize:'1.35rem',fontWeight:800,color:'var(--text)',marginBottom:'4px'}}>{modal.title}</h2>
          <div style={{display:'flex',gap:'9px',marginTop:'13px',flexWrap:'wrap'}}>
            {ex.github&&<a href={ex.github} target="_blank" className="btn btn-ghost btn-sm">⎈ GitHub</a>}
            {ex.demo  &&<a href={ex.demo}   target="_blank" className="btn btn-ghost btn-sm">▶ Demo</a>}
          </div>
        </div>

        {/* Tabs */}
        {tabs.length>1&&(
          <div className="modal-tabs" style={{marginTop:'20px'}}>
            {tabs.map(t=><button key={t.id} className={`modal-tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
          </div>
        )}

        <div style={{padding:'22px 26px 26px'}}>

          {/* ── Overview ── */}
          {tab==='overview'&&(
            <div>
              <p style={{color:'var(--muted)',lineHeight:1.88,marginBottom:'20px',fontSize:'.93rem',whiteSpace:'pre-line'}}>
                {modal.longDesc||modal.desc}
              </p>
              {ex.notes&&(
                <div style={{background:'rgba(99,102,241,.06)',border:'1px solid rgba(99,102,241,.18)',borderRadius:'10px',padding:'13px 17px',marginBottom:'20px'}}>
                  <p style={{color:'#a5b4fc',fontSize:'.87rem',lineHeight:1.72}}>{ex.notes}</p>
                </div>
              )}
              <div style={{fontSize:'.74rem',color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'9px'}}>Tech Stack</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'7px'}}>{modal.tech.map(t=><span key={t} className="tag">{t}</span>)}</div>
            </div>
          )}

          {/* ── Media ── */}
          {tab==='media'&&(
            <div>
              {vid&&(
                <div style={{marginBottom:'22px'}}>
                  <div style={{fontSize:'.75rem',color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'10px'}}>Video Demo</div>
                  <div className="video-wrap">
                    <iframe src={`https://www.youtube.com/embed/${vid}`} allowFullScreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"/>
                  </div>
                </div>
              )}
              {imgs.length>0&&(
                <div>
                  <div style={{fontSize:'.75rem',color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'10px'}}>Screenshots</div>
                  <div className="gallery">
                    {imgs.map((src,i)=><img key={i} src={src} alt={`Screenshot ${i+1}`} onClick={()=>window.open(src,'_blank')} onError={e=>e.target.style.display='none'}/>)}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── Edit (admin) ── */}
          {tab==='edit'&&adminMode&&(
            <div>
              <div style={{background:'rgba(109,40,217,.07)',border:'1px solid rgba(109,40,217,.22)',borderRadius:'9px',padding:'12px 15px',marginBottom:'20px',fontSize:'.81rem',color:'#c084fc'}}>
                🔧 Changes are saved in your browser (localStorage) and persist across sessions.
              </div>
              <div className="form-group">
                <label className="form-label">GitHub / Repository URL</label>
                <input className="form-input" placeholder="https://github.com/..." value={form.github} onChange={e=>setForm(f=>({...f,github:e.target.value}))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Live Demo URL</label>
                <input className="form-input" placeholder="https://..." value={form.demo} onChange={e=>setForm(f=>({...f,demo:e.target.value}))}/>
              </div>
              <div className="form-group">
                <label className="form-label">YouTube Video URL (auto-embedded)</label>
                <input className="form-input" placeholder="https://youtube.com/watch?v=..." value={form.videoUrl} onChange={e=>setForm(f=>({...f,videoUrl:e.target.value}))}/>
              </div>
              <div className="form-group">
                <label className="form-label">Images (URLs or uploads)</label>
                {form.imageUrls.map((u,i)=>(
                  <div key={i} style={{display:'flex',gap:'7px',marginBottom:'7px'}}>
                    <input className="form-input" placeholder="Image URL..." value={u} onChange={e=>{ const a=[...form.imageUrls]; a[i]=e.target.value; setForm(f=>({...f,imageUrls:a})); }}/>
                    {form.imageUrls.length>1&&<button className="btn btn-sm btn-danger" onClick={()=>setForm(f=>({...f,imageUrls:f.imageUrls.filter((_,j)=>j!==i)}))}>✕</button>}
                  </div>
                ))}
                <div style={{display:'flex',gap:'8px',marginTop:'5px',flexWrap:'wrap'}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setForm(f=>({...f,imageUrls:[...f.imageUrls,'']}))}>+ Add URL</button>
                  <label className="btn btn-ghost btn-sm" style={{cursor:'pointer'}}>
                    📁 Upload Image(s)
                    <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={uploadFiles}/>
                  </label>
                </div>
                <div style={{fontSize:'.7rem',color:'var(--subtle)',marginTop:'6px'}}>💡 Uploaded images are stored locally in your browser. For large images, prefer hosting them and adding the URL.</div>
              </div>
              <div className="form-group">
                <label className="form-label">Additional Notes (shown in project overview)</label>
                <textarea className="form-textarea" placeholder="Extra context, achievements, or notes..." value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
              </div>
              <button className="btn btn-primary" onClick={saveForm} style={{marginTop:'4px'}}>
                {saved ? '✓ Saved!' : 'Save Changes'}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    </section>
  );
}

/* ================================================================
   EDUCATION
================================================================ */
function Education() {
  const ref=useRef(); useReveal(ref);
  return (
    <section id="education" className="section">
      <div className="inner" ref={ref}>
        <h2 className="sec-title sr">Education</h2>
        <p className="sr sr-delay-1" style={{color:'var(--subtle)',marginBottom:'44px',maxWidth:'500px',marginTop:'6px'}}>Three countries, two scholarships, one engineering degree in progress.</p>
        <div style={{position:'relative',paddingLeft:'42px',maxWidth:'790px'}}>
          <div className="tl-line"/>
          {CONFIG.education.map((e,i)=>(
            <div key={e.id} className={`sr sr-delay-${i+1}`} style={{position:'relative',marginBottom:'20px',paddingTop:'8px'}}>
              <div className="tl-dot" style={{top:'16px'}}/>
              <div className="glass" style={{padding:'19px 24px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'6px'}}>
                  <span style={{fontWeight:700,fontSize:'.96rem',color:'var(--text)'}}>{e.institution}</span>
                  <span className="mono" style={{color:'#818cf8',fontSize:'.77rem',fontWeight:500}}>{e.period}</span>
                </div>
                <div style={{color:'#06b6d4',fontWeight:600,marginTop:'5px',fontSize:'.89rem'}}>{e.degree}</div>
                {e.note&&<div style={{color:'var(--subtle)',fontSize:'.79rem',marginTop:'5px'}}>📌 {e.note}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ================================================================
   SKILLS + CERTIFICATIONS
================================================================ */
function Skills() {
  const { adminMode, store, updateStore } = useContext(Ctx);
  const ref=useRef(); useReveal(ref);

  function uploadCertImage(certId,e) {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>updateStore(prev=>({...prev,certs:{...prev.certs,[certId]:{...prev.certs[certId],image:ev.target.result}}}));
    r.readAsDataURL(f);
  }
  function saveCertUrl(certId,url) {
    updateStore(prev=>({...prev,certs:{...prev.certs,[certId]:{...prev.certs[certId],imageUrl:url}}}));
  }

  return (
    <section id="skills" className="section" style={{background:'rgba(255,255,255,.01)'}}>
      <div className="inner" ref={ref}>
        <h2 className="sec-title sr">Skills</h2>
        <p className="sr sr-delay-1" style={{color:'var(--subtle)',marginBottom:'44px',maxWidth:'520px',marginTop:'6px'}}>
          Strong foundations in probabilistic reasoning, software architecture, and multi-paradigm programming.
        </p>
        <div className="skills-grid sr sr-delay-2" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(325px,1fr))',gap:'16px'}}>
          {Object.entries(CONFIG.skills).map(([cat,items])=>(
            <div key={cat} className="glass" style={{padding:'20px 22px'}}>
              <h3 style={{fontWeight:700,fontSize:'.73rem',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:'11px'}}>
                <span className="gradient-text">{cat}</span>
              </h3>
              <div style={{display:'flex',flexWrap:'wrap',gap:'7px'}}>{items.map(s=><span key={s} className="tag">{s}</span>)}</div>
            </div>
          ))}
        </div>

        {/* Certifications */}
        <div className="sr sr-delay-3" style={{marginTop:'50px'}}>
          <h3 style={{fontWeight:700,color:'var(--muted)',marginBottom:'18px',fontSize:'.9rem'}}>Certifications</h3>
          <div style={{display:'flex',gap:'16px',flexWrap:'wrap'}}>
            {CONFIG.certifications.map(cert=>{
              const cd=store.certs[cert.id]||{};
              const imgSrc=cd.image||cd.imageUrl;
              return(
                <div key={cert.id} className="glass" style={{padding:'22px',maxWidth:'480px',flex:1,minWidth:'270px'}}>
                  <div style={{display:'flex',gap:'14px',alignItems:'flex-start'}}>
                    <span style={{fontSize:'1.7rem',flexShrink:0}}>{cert.relevant?'📐':'🏆'}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:'var(--text)',fontSize:'.94rem'}}>{cert.name}</div>
                      <div style={{color:'var(--subtle)',fontSize:'.77rem',marginTop:'2px'}}>{cert.issuer}</div>
                      <div style={{color:'var(--muted)',fontSize:'.83rem',marginTop:'7px',lineHeight:1.65}}>{cert.note}</div>
                      {imgSrc&&(
                        <div style={{marginTop:'13px'}}>
                          <img src={imgSrc} alt="Certificate" style={{width:'100%',borderRadius:'8px',border:'1px solid var(--border)',cursor:'pointer',transition:'transform .2s'}}
                            onClick={()=>window.open(imgSrc,'_blank')} onMouseEnter={e=>e.target.style.transform='scale(1.015)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}/>
                          <div style={{fontSize:'.7rem',color:'var(--subtle)',marginTop:'4px'}}>Click to view full size</div>
                        </div>
                      )}
                      {adminMode&&<CertAdmin cert={cert} cd={cd} onUpload={uploadCertImage} onUrl={saveCertUrl}/>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ================================================================
   CERTIFICATE ADMIN PANEL
================================================================ */
function CertAdmin({ cert, cd, onUpload, onUrl }) {
  const [urlVal, setUrlVal] = useState(cd.imageUrl||'');
  return (
    <div style={{marginTop:'13px',paddingTop:'13px',borderTop:'1px solid rgba(109,40,217,.2)'}}>
      <div style={{fontSize:'.7rem',color:'#a78bfa',fontWeight:700,marginBottom:'9px'}}>🔧 ADMIN — Certificate Image</div>
      <div style={{display:'flex',gap:'7px',marginBottom:'7px'}}>
        <input className="form-input" placeholder="Image URL..." value={urlVal} onChange={e=>setUrlVal(e.target.value)} style={{fontSize:'.79rem',padding:'7px 11px'}}/>
        <button className="btn btn-sm btn-purple" onClick={()=>onUrl(cert.id,urlVal)}>Save URL</button>
      </div>
      <label className="btn btn-ghost btn-sm" style={{cursor:'pointer',fontSize:'.73rem'}}>
        📁 Upload File <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>onUpload(cert.id,e)}/>
      </label>
    </div>
  );
}

/* ================================================================
   CONTACT
================================================================ */
function Contact() {
  const ref=useRef(); useReveal(ref);
  return (
    <section id="contact" className="section">
      <div className="inner" ref={ref}>
        <div style={{maxWidth:'640px',margin:'0 auto',textAlign:'center'}}>
          <h2 className="sec-title sr" style={{display:'inline-block'}}>Let's Connect</h2>
          <p className="sr sr-delay-1" style={{color:'var(--subtle)',lineHeight:1.85,margin:'18px 0 38px',fontSize:'.97rem'}}>
            I'm actively looking for internship opportunities in probabilistic modeling, Bayesian methods, and software engineering. If you're working on something interesting in these areas, I'd love to talk.
          </p>
          <div className="sr sr-delay-2" style={{display:'flex',gap:'11px',justifyContent:'center',flexWrap:'wrap',marginBottom:'44px'}}>
            <a href={`mailto:${CONFIG.email}`} className="btn btn-primary" style={{padding:'13px 32px'}}>📧 Send Email</a>
            {CONFIG.linkedin&&<a href={CONFIG.linkedin} target="_blank" className="btn btn-ghost" style={{padding:'13px 26px'}}>LinkedIn</a>}
            {CONFIG.github  &&<a href={CONFIG.github}   target="_blank" className="btn btn-ghost" style={{padding:'13px 26px'}}>GitHub</a>}
          </div>
          <div className="sr sr-delay-3 glass" style={{display:'inline-block',padding:'13px 26px'}}>
            <span className="mono" style={{color:'var(--muted)',fontSize:'.87rem'}}>{CONFIG.email}</span>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ================================================================
   FOOTER
================================================================ */
function Footer() {
  return (
    <footer style={{padding:'24px 5%',borderTop:'1px solid rgba(255,255,255,.04)',textAlign:'center',color:'var(--subtle)',fontSize:'.79rem'}}>
      <p>Built by <span className="gradient-text" style={{fontWeight:700}}>{CONFIG.name}</span> — {new Date().getFullYear()} &nbsp;·&nbsp; <span style={{opacity:.45}}>React + localStorage</span></p>
    </footer>
  );
}

/* ================================================================
   APP ROOT
================================================================ */
function App() {
  const [adminMode, setAdminMode] = useState(false);
  const [store,     setStore]     = useState(()=>loadStore());
  const [modal,     setModal]     = useState(null);   // selected project

  const updateStore = useCallback(updater=>{
    setStore(prev=>{ const next=typeof updater==='function'?updater(prev):updater; saveStore(next); return next; });
  },[]);

  // Lock body scroll when modal is open
  useEffect(()=>{ document.body.style.overflow=modal?'hidden':''; return()=>{ document.body.style.overflow=''; }; },[modal]);

  const ctx={ adminMode,setAdminMode, store,updateStore, modal,setModal };

  return (
    <Ctx.Provider value={ctx}>
      {adminMode&&<AdminBar onExit={()=>setAdminMode(false)}/>}
      <Navbar/>
      <Hero/>
      <ProbabilisticFocus/>
      <About/>
      <Projects/>
      <Education/>
      <Skills/>
      <Contact/>
      <Footer/>
      <ProjectModal/>
      <AdminToggle/>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
